<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>three-app</title>
  </head>
  <body>
    <canvas id="webgl"></canvas>
    


    
    <div id="main-scene" class="scene active">
      <div class="bg-wrapper">
        <!-- 多层植物动画背景 -->
        <div class="animation-wrapper">
          <div id="sky-layer" class="animation-layer"></div>
          <div id="bg-layer" class="animation-layer"></div>
          <div id="far-layer" class="animation-layer"></div>
          <div id="mid-layer" class="animation-layer"></div>
          <div id="front-layer" class="animation-layer"></div>
        </div>
        <div class="svg-container">
          <!-- Lottie 动画 - bubble ui 配套动画（位置由 JavaScript 动态计算） -->
          <div id="lottie-bubble-baby" class="lottie-bubble" style="
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 101;
            pointer-events: none;
          "></div>
          <div id="lottie-bubble-kid" class="lottie-bubble" style="
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 101;
            pointer-events: none;
          "></div>
          <div id="lottie-bubble-adult" class="lottie-bubble" style="
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 101;
            pointer-events: none;
          "></div>
          <div id="lottie-bubble-old" class="lottie-bubble" style="
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 101;
            pointer-events: none;
          "></div>
          
          <!-- Lottie 动画容器 - 四个人物动画（位置由 JavaScript 动态计算） -->
          <div id="lottie-baby" class="lottie-character" style="
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
          "></div>
          <div id="lottie-kid" class="lottie-character" style="
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
          "></div>
          <div id="lottie-adult" class="lottie-character" style="
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
          "></div>
          <div id="lottie-old" class="lottie-character" style="
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
          "></div>

        </div>
      </div>
    </div>
    
    <!-- 底页背景层 - Asset 12 最底层 -->
    <div class="bottom-bg" id="bottom-bg-12"></div>
    <!-- 底页背景层 - Asset 11 上层 -->
    <div class="bottom-bg" id="bottom-bg-11"></div>
    
    <div id="detail-scene" class="scene">
      <!-- 二级页面渐变背景 - 上 -->
      <div class="gradient-bg gradient-top"></div>
      <!-- 二级页面渐变背景 - 下 -->
      <div class="gradient-bg gradient-bottom"></div>
      <!-- 粉色底色 - 固定底图 -->
      <div class="pink-bg"></div>
      <div class="scroll-container">
        <img src="/线.svg" class="line-overlay" alt="Line">
        <img src="/列表(1).svg" class="detail-image" alt="Detail">
      </div>
    </div>
    
    <!-- 二级页面前景 Lottie 动画 -->
    <div class="mask-layer" id="mask-lottie"></div>
    
    <div class="close-btn">
      <img src="/叉.svg" alt="Close">
    </div>
    
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-content">
        <div class="modal-close" id="modalClose">
          <img src="/叉.svg" alt="Close">
        </div>
        <div class="modal-body" id="modalBody">
        </div>
      </div>
    </div>
    
    <div class="fixed-images">
      <img src="/人物/婴儿.svg" class="fixed-img" data-scroll-start="6000" data-scroll-end="7560" alt="婴儿">
      <img src="/人物/小孩.svg" class="fixed-img" data-scroll-start="4800" data-scroll-end="6000" alt="小孩">
      <img src="/人物/大人.svg" class="fixed-img" data-scroll-start="4200" data-scroll-end="4800" alt="大人">
      <img src="/人物/老人.svg" class="fixed-img" data-scroll-start="2900" data-scroll-end="4200" alt="老人">
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
